# Pytest Configuration File
# This file centralizes test execution settings, specifically defining 
# how and where logs are generated during manual terminal runs.

[pytest]
# Path to the log file relative to the project root
# Using './tests/pytest.log' ensures logs stay within the test directory
log_file = ./tests/pytest.log

# Minimum log level to capture (DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_file_level = INFO

# Log Message Structure:
# - %(asctime)s: Timestamp of the event
# - [%(levelname)s]: Importance level (e.g., [INFO] or [ERROR])
# - %(message)s: The actual log text from your app or tests
log_file_format = %(asctime)s [%(levelname)s] %(message)s

# Timestamp Formatting (Year-Month-Day Hour:Minute:Second)
log_file_date_format = %Y-%m-%d %H:%M:%S