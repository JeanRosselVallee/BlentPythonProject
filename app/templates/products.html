<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Informatique Shop - Accueil</title>
    <style>
        .product-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .card { border: 1px solid #ccc; padding: 15px; width: 250px; border-radius: 8px; }
        .price { color: green; font-weight: bold; }
        .stock { font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <h1>Nos Composants Informatiques</h1>
    
    <div class="product-grid">
        {% for p in products %}
        <div class="card">
            <h3>{{ p.nom }}</h3>
            <p>{{ p.description }}</p>
            <p class="price">{{ p.prix }} €</p>
            <p class="stock">En stock: {{ p.quantite_stock }}</p>
            <button>Ajouter au panier</button>
        </div>
        {% else %}
        <p>Aucun produit disponible pour le moment.</p>
        {% endfor %}
    </div>
</body>
</html>
