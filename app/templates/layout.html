<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Informatique Shop</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --dark-blue: #2c3e50;
            --accent-blue: #3498db;
            --success-green: #27ae60;
        }

        body {
            background-color: #f8f9fa;
        }

        /* Top Horizontal Section (Navbar) */
        .navbar-custom {
            background-color: var(--dark-blue);
            padding: 1rem 2rem;
        }

        .navbar-brand {
            font-weight: bold;
            color: white !important;
            font-size: 1.5rem;
        }

        .search-bar {
            max-width: 500px;
            flex-grow: 1;
            margin: 0 2rem;
        }

        .cart-info {
            background-color: var(--success-green);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Product Grid Styling (used by catalog.html) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding-top: 20px;
        }

        .card {
            transition: transform 0.2s;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .price {
            font-size: 1.25rem;
            color: #e67e22;
            font-weight: bold;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="https://mydigimarket.store/about">DigiMarket</a>

            <div class="d-flex ms-auto me-4">
                <div class="input-group">
                    <input type="text" 
                        id="navSearchInput" 
                        class="form-control" 
                        placeholder="SSD, Stockage..." 
                        aria-label="Search">
                    <button class="btn btn-primary" type="button" onclick="submitGlobalSearch()">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex align-items-center gap-3">
                <a href="{{ url_for('web.catalog') }}" class="btn btn-outline-light" id="nav-catalog-link">
                    <i class="bi bi-shop me-2"></i>Catalogue
                </a>

                <div id="auth-section">
                    <a href="{{ url_for('web.login') }}" class="btn btn-primary" id="btn-login">Connexion</a>
                </div>

                <a href="{{ url_for('web.cart') }}" class="cart-info" id="nav-cart-link">
                    🛒 <span id="cart-text">Panier</span> (<span id="cart-count">0</span>)
                </a>
            </div>
        </div>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateNavbarUI();
        });

        function updateNavbarUI() {
            const userRole = (localStorage.getItem('user_role') || "client").toLowerCase().trim();
            const isAdmin = userRole === 'admin';
            
            const catalogLink = document.getElementById('nav-catalog-link');
            const cartLink = document.getElementById('nav-cart-link');

            const icon = '<i class="bi bi-shop me-2"></i>';

            if (isAdmin) {
                if (catalogLink) catalogLink.innerHTML = icon + "Gestion Produits";
                if (cartLink) cartLink.style.display = 'none';
            } else {
                if (catalogLink) catalogLink.innerHTML = icon + "Catalogue";
                if (cartLink) cartLink.style.display = 'block';
            }
        }
    </script>    
    
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <hr>
        <p>&copy; 2026 DigiMarket E-commerce - Projet Blent AI</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        async function updateCartUI() {
            const token = localStorage.getItem('token');
            const orderId = localStorage.getItem('active_cart_id');
            const cartCountElement = document.getElementById('cart-count');

            if (!orderId || !token) {
                if (cartCountElement) cartCountElement.innerText = "0";
                return;
            }

            try {
                const response = await fetch(`/api/commandes/${orderId}/lignes`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const items = await response.json();
                    const totalQuantity = Array.isArray(items) 
                        ? items.reduce((sum, item) => sum + item.quantite, 0) 
                        : 0;
                    
                    if (cartCountElement) cartCountElement.innerText = totalQuantity;
                }
            } catch (error) {
                console.error("Error updating cart UI:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCartUI();
            
            const token = localStorage.getItem('token');
            const userRole = (localStorage.getItem('user_role') || "client").toLowerCase().trim();
            const authSection = document.getElementById('auth-section');

            if (token) {
                const isAdmin = userRole === 'admin';
                const ordersLabel = isAdmin ? "Gestion Commandes" : "Mes Commandes";
                const ordersRoute = "/orders"; 

                // Uniform height: Using standard btn class (no btn-sm)
                authSection.innerHTML = `    
                    <a href="${ordersRoute}" class="btn btn-outline-light me-2">
                        <i class="bi ${isAdmin ? 'bi-speedometer2' : 'bi-bag-check'} me-1"></i> ${ordersLabel}
                    </a>
                    <button class="btn btn-outline-danger" onclick="logout()">Déconnexion</button>
                `;
            }
        });

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('active_cart_id');
            window.location.href = "{{ url_for('web.login') }}";
        }

        function submitGlobalSearch() {
            const input = document.getElementById('navSearchInput').value.trim();
            
            if (!input) {
                window.location.href = "{{ url_for('web.catalog') }}";
                return;
            }

            const keywords = input.split(/[\s,]+/).filter(k => k.length > 0);
            const params = new URLSearchParams();
            
            keywords.forEach(word => params.append('keywords', word));

            window.location.href = `{{ url_for('web.catalog') }}?${params.toString()}`;
        }

        document.getElementById('navSearchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') submitGlobalSearch();
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
