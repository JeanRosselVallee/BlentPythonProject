{% extends "layout.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5">
            <div class="card-body">
                <h2 class="text-center mb-4">Connexion</h2>
                
                <div id="error-message" class="alert alert-danger d-none"></div>

                <form id="login-form">
                    <div class="mb-3">
                        <label for="email" class="form-label">Adresse Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Mot de passe</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                </form>

                <div class="mt-3 text-center">
                    <p>Pas encore de compte ? <a href="{{ url_for('web.register') }}">S'inscrire</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevent page reload
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    "email": email, 
                    "password": password 
                })
            });

            const data = await response.json();

            if (response.ok) {
                // 1. Store the token and role in localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('user_role', data.role); // e.g., 'admin' or 'client'

                window.location.href = "{{ url_for('web.catalog') }}";
            } else {
                // Show error from API
                errorDiv.textContent = data.message || "Identifiants incorrects";
                errorDiv.classList.remove('d-none');
            }
        } catch (error) {
            errorDiv.textContent = "Erreur de connexion au serveur";
            errorDiv.classList.remove('d-none');
        }
    });
</script>
{% endblock %}
